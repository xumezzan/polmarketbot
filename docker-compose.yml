services:
  migrate:
    build: .
    container_name: polymarket_migrate
    command: alembic upgrade head
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    volumes:
      - .:/code
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: polymarket_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Polymarket News Bot}
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      NEWS_FETCH_MODE: ${NEWS_FETCH_MODE:-stub}
      NEWS_API_BASE_URL: ${NEWS_API_BASE_URL:-https://newsapi.org/v2}
      NEWS_QUERY: ${NEWS_QUERY:-(bitcoin OR ethereum OR crypto OR ETF OR "Federal Reserve" OR inflation OR tariff OR recession OR election) NOT (auction OR "No Reserve" OR "Bring a Trailer")}
      NEWS_LANGUAGE: ${NEWS_LANGUAGE:-en}
      NEWS_PAGE_SIZE: ${NEWS_PAGE_SIZE:-20}
      NEWS_LOOKBACK_HOURS: ${NEWS_LOOKBACK_HOURS:-24}
      NEWS_ENABLE_FALLBACK_LOOKBACK: ${NEWS_ENABLE_FALLBACK_LOOKBACK:-true}
      NEWS_FALLBACK_LOOKBACK_HOURS: ${NEWS_FALLBACK_LOOKBACK_HOURS:-72}
      NEWS_SEARCH_IN: ${NEWS_SEARCH_IN:-title,description}
      NEWS_SORT_BY: ${NEWS_SORT_BY:-relevancy}
      NEWS_EXCLUDE_DOMAINS: ${NEWS_EXCLUDE_DOMAINS:-bringatrailer.com}
      NEWS_API_TIMEOUT_SECONDS: ${NEWS_API_TIMEOUT_SECONDS:-15}
      NEWS_RELEVANCE_FILTER_ENABLED: ${NEWS_RELEVANCE_FILTER_ENABLED:-true}
      NEWS_RELEVANCE_MIN_HITS: ${NEWS_RELEVANCE_MIN_HITS:-2}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      LLM_MODE: ${LLM_MODE:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-300}
      LLM_MAX_CONTENT_CHARS: ${LLM_MAX_CONTENT_CHARS:-4000}
      MARKET_FETCH_MODE: ${MARKET_FETCH_MODE:-stub}
      GAMMA_API_BASE_URL: ${GAMMA_API_BASE_URL:-https://gamma-api.polymarket.com}
      GAMMA_MARKETS_PAGE_SIZE: ${GAMMA_MARKETS_PAGE_SIZE:-200}
      GAMMA_MARKETS_MAX_PAGES: ${GAMMA_MARKETS_MAX_PAGES:-5}
      GAMMA_FETCH_ACTIVE_ONLY: ${GAMMA_FETCH_ACTIVE_ONLY:-true}
      GAMMA_FETCH_CLOSED: ${GAMMA_FETCH_CLOSED:-false}
      GAMMA_REQUEST_TIMEOUT_SECONDS: ${GAMMA_REQUEST_TIMEOUT_SECONDS:-20}
      MARKET_TOP_N: ${MARKET_TOP_N:-5}
      MARKET_MATCH_STRATEGY: ${MARKET_MATCH_STRATEGY:-keyword}
      MARKET_MATCH_MIN_SCORE: ${MARKET_MATCH_MIN_SCORE:-0.15}
      MARKET_MATCH_EXACT_WEIGHT: ${MARKET_MATCH_EXACT_WEIGHT:-0.35}
      MARKET_MATCH_QUESTION_WEIGHT: ${MARKET_MATCH_QUESTION_WEIGHT:-0.35}
      MARKET_MATCH_SLUG_WEIGHT: ${MARKET_MATCH_SLUG_WEIGHT:-0.15}
      MARKET_MATCH_EVENT_WEIGHT: ${MARKET_MATCH_EVENT_WEIGHT:-0.10}
      MARKET_MATCH_LIQUIDITY_WEIGHT: ${MARKET_MATCH_LIQUIDITY_WEIGHT:-0.05}
      MARKET_CORRELATION_FILTER_ENABLED: ${MARKET_CORRELATION_FILTER_ENABLED:-true}
      MARKET_CORRELATION_JACCARD_THRESHOLD: ${MARKET_CORRELATION_JACCARD_THRESHOLD:-0.75}
      MARKET_CORRELATION_BLOCK_SAME_EVENT: ${MARKET_CORRELATION_BLOCK_SAME_EVENT:-true}
      SIGNAL_ACTIONABLE_EDGE_THRESHOLD: ${SIGNAL_ACTIONABLE_EDGE_THRESHOLD:-0.07}
      SIGNAL_ACTIONABLE_CONFIDENCE_THRESHOLD: ${SIGNAL_ACTIONABLE_CONFIDENCE_THRESHOLD:-0.70}
      SIGNAL_ACTIONABLE_RELEVANCE_THRESHOLD: ${SIGNAL_ACTIONABLE_RELEVANCE_THRESHOLD:-0.65}
      SIGNAL_WATCHLIST_EDGE_THRESHOLD: ${SIGNAL_WATCHLIST_EDGE_THRESHOLD:-0.01}
      RISK_MIN_CONFIDENCE: ${RISK_MIN_CONFIDENCE:-0.70}
      RISK_MIN_RELEVANCE: ${RISK_MIN_RELEVANCE:-0.65}
      RISK_MAX_NEWS_AGE_MINUTES: ${RISK_MAX_NEWS_AGE_MINUTES:-360}
      RISK_ENABLE_EXTENDED_NEWS_AGE_WINDOW: ${RISK_ENABLE_EXTENDED_NEWS_AGE_WINDOW:-false}
      RISK_EXTENDED_MAX_NEWS_AGE_MINUTES: ${RISK_EXTENDED_MAX_NEWS_AGE_MINUTES:-1800}
      RISK_EXTENDED_NEWS_AGE_SIZE_MULTIPLIER: ${RISK_EXTENDED_NEWS_AGE_SIZE_MULTIPLIER:-0.50}
      RISK_MIN_MARKET_LIQUIDITY: ${RISK_MIN_MARKET_LIQUIDITY:-10000}
      RISK_PRICED_IN_EDGE_THRESHOLD: ${RISK_PRICED_IN_EDGE_THRESHOLD:-0.03}
      RISK_MAX_DAILY_EXPOSURE_USD: ${RISK_MAX_DAILY_EXPOSURE_USD:-250}
      RISK_MAX_TRADE_SIZE_USD: ${RISK_MAX_TRADE_SIZE_USD:-50}
      RISK_MAX_LIQUIDITY_SHARE: ${RISK_MAX_LIQUIDITY_SHARE:-0.02}
      RISK_BLOCK_ON_EXISTING_POSITION: ${RISK_BLOCK_ON_EXISTING_POSITION:-true}
      PAPER_REQUIRE_RISK_APPROVAL: ${PAPER_REQUIRE_RISK_APPROVAL:-true}
      PAPER_AUTO_CLOSE_ENABLED: ${PAPER_AUTO_CLOSE_ENABLED:-true}
      PAPER_TAKE_PROFIT_DELTA: ${PAPER_TAKE_PROFIT_DELTA:-0.08}
      PAPER_STOP_LOSS_DELTA: ${PAPER_STOP_LOSS_DELTA:-0.05}
      PAPER_MAX_HOLD_MINUTES: ${PAPER_MAX_HOLD_MINUTES:-360}
      SCHEDULER_INTERVAL_MINUTES: ${SCHEDULER_INTERVAL_MINUTES:-15}
      SCHEDULER_NEWS_BATCH_LIMIT: ${SCHEDULER_NEWS_BATCH_LIMIT:-10}
      SCHEDULER_CONTINUE_ON_ITEM_ERROR: ${SCHEDULER_CONTINUE_ON_ITEM_ERROR:-true}
      OPERATOR_RECENT_SIGNALS_DEFAULT_LIMIT: ${OPERATOR_RECENT_SIGNALS_DEFAULT_LIMIT:-20}
      OPERATOR_RECENT_SIGNALS_MAX_LIMIT: ${OPERATOR_RECENT_SIGNALS_MAX_LIMIT:-100}
      ALERT_MODE: ${ALERT_MODE:-noop}
      ALERT_ON_TRADE_OPENED: ${ALERT_ON_TRADE_OPENED:-true}
      ALERT_ON_TRADE_CLOSED: ${ALERT_ON_TRADE_CLOSED:-true}
      ALERT_ON_SCHEDULER_ERROR: ${ALERT_ON_SCHEDULER_ERROR:-true}
      ALERT_ON_CYCLE_SUMMARY: ${ALERT_ON_CYCLE_SUMMARY:-false}
      ALERT_ON_DAILY_REPORT: ${ALERT_ON_DAILY_REPORT:-true}
      DAILY_REPORT_WINDOW_HOURS: ${DAILY_REPORT_WINDOW_HOURS:-24}
      DAILY_REPORT_HOUR_UTC: ${DAILY_REPORT_HOUR_UTC:-0}
      DAILY_REPORT_MINUTE_UTC: ${DAILY_REPORT_MINUTE_UTC:-10}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_REQUEST_TIMEOUT_SECONDS: ${TELEGRAM_REQUEST_TIMEOUT_SECONDS:-10}
      TELEGRAM_DISABLE_NOTIFICATION: ${TELEGRAM_DISABLE_NOTIFICATION:-false}
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    container_name: polymarket_scheduler
    command: python -m app.scheduler
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Polymarket News Bot}
