      NEWS_QUERY: ${NEWS_QUERY:-(bitcoin OR ethereum OR crypto OR ETF OR "Federal Reserve" OR inflation OR tariff OR recession OR election) NOT (auction OR "No Reserve" OR "Bring a Trailer")}
