services:
  api:
    build: .
    container_name: polymarket_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_NAME: ${APP_NAME:-Polymarket News Bot}
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      NEWS_FETCH_MODE: ${NEWS_FETCH_MODE:-stub}
      NEWS_API_BASE_URL: ${NEWS_API_BASE_URL:-https://newsapi.org/v2}
      NEWS_QUERY: ${NEWS_QUERY:-bitcoin OR ethereum OR crypto}
      NEWS_LANGUAGE: ${NEWS_LANGUAGE:-en}
      NEWS_PAGE_SIZE: ${NEWS_PAGE_SIZE:-20}
      NEWS_LOOKBACK_HOURS: ${NEWS_LOOKBACK_HOURS:-24}
      NEWS_SEARCH_IN: ${NEWS_SEARCH_IN:-title,description,content}
      NEWS_API_TIMEOUT_SECONDS: ${NEWS_API_TIMEOUT_SECONDS:-15}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      LLM_MODE: ${LLM_MODE:-stub}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0}
      OPENAI_MAX_COMPLETION_TOKENS: ${OPENAI_MAX_COMPLETION_TOKENS:-300}
      LLM_MAX_CONTENT_CHARS: ${LLM_MAX_CONTENT_CHARS:-4000}
      MARKET_FETCH_MODE: ${MARKET_FETCH_MODE:-stub}
      GAMMA_API_BASE_URL: ${GAMMA_API_BASE_URL:-https://gamma-api.polymarket.com}
      GAMMA_MARKETS_PAGE_SIZE: ${GAMMA_MARKETS_PAGE_SIZE:-200}
      GAMMA_MARKETS_MAX_PAGES: ${GAMMA_MARKETS_MAX_PAGES:-5}
      GAMMA_FETCH_ACTIVE_ONLY: ${GAMMA_FETCH_ACTIVE_ONLY:-true}
      GAMMA_FETCH_CLOSED: ${GAMMA_FETCH_CLOSED:-false}
      GAMMA_REQUEST_TIMEOUT_SECONDS: ${GAMMA_REQUEST_TIMEOUT_SECONDS:-20}
      MARKET_TOP_N: ${MARKET_TOP_N:-5}
      MARKET_MATCH_STRATEGY: ${MARKET_MATCH_STRATEGY:-keyword}
      MARKET_MATCH_MIN_SCORE: ${MARKET_MATCH_MIN_SCORE:-0.15}
      MARKET_MATCH_EXACT_WEIGHT: ${MARKET_MATCH_EXACT_WEIGHT:-0.35}
      MARKET_MATCH_QUESTION_WEIGHT: ${MARKET_MATCH_QUESTION_WEIGHT:-0.35}
      MARKET_MATCH_SLUG_WEIGHT: ${MARKET_MATCH_SLUG_WEIGHT:-0.15}
      MARKET_MATCH_EVENT_WEIGHT: ${MARKET_MATCH_EVENT_WEIGHT:-0.10}
      MARKET_MATCH_LIQUIDITY_WEIGHT: ${MARKET_MATCH_LIQUIDITY_WEIGHT:-0.05}
      MARKET_CORRELATION_FILTER_ENABLED: ${MARKET_CORRELATION_FILTER_ENABLED:-true}
      MARKET_CORRELATION_JACCARD_THRESHOLD: ${MARKET_CORRELATION_JACCARD_THRESHOLD:-0.75}
      MARKET_CORRELATION_BLOCK_SAME_EVENT: ${MARKET_CORRELATION_BLOCK_SAME_EVENT:-true}
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: polymarket_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
