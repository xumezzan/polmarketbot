      ALERT_ON_TRADE_OPENED: ${ALERT_ON_TRADE_OPENED:-true}
      ALERT_ON_TRADE_CLOSED: ${ALERT_ON_TRADE_CLOSED:-true}
      ALERT_ON_SCHEDULER_ERROR: ${ALERT_ON_SCHEDULER_ERROR:-true}
      ALERT_ON_CYCLE_SUMMARY: ${ALERT_ON_CYCLE_SUMMARY:-false}
      ALERT_ON_DAILY_REPORT: ${ALERT_ON_DAILY_REPORT:-true}
